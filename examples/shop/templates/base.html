<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Shop{% endblock %} - Crypto Shop</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Stack+Sans+Headline:wght@200..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ── Theme ── */
    [data-theme="dark"] {
      --color-bg: #191919;
      --color-text: #e5e7eb;
      --color-primary: #1a1a1a;
      --color-grid: rgba(255, 255, 255, 0.005);
    }

    :root {
      --font-main: "Stack Sans Headline", sans-serif;
      --radius: 0.3rem;

      --color-surface: #222222;
      --color-surface-2: #2a2a2a;
      --color-border: rgba(255,255,255,0.07);
      --color-muted: #6b7280;
      --color-accent: #e5e7eb;
      --color-accent-dim: rgba(229,231,235,0.08);
      --color-success: #34d399;
      --color-warning: #fbbf24;
      --color-danger: #f87171;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: var(--font-main);
      font-weight: 300;
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Grid background ── */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--color-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--color-grid) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Nav ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(25,25,25,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--color-border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--color-text);
      text-decoration: none;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .cart-btn {
      background: none;
      border: 1px solid var(--color-border);
      color: var(--color-text);
      font-family: var(--font-main);
      font-size: 0.85rem;
      padding: 0.4rem 0.9rem;
      border-radius: var(--radius);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: border-color 0.15s, background 0.15s;
    }
    .cart-btn:hover { background: var(--color-accent-dim); border-color: rgba(255,255,255,0.18); }

    #cart-count {
      background: var(--color-text);
      color: var(--color-bg);
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      min-width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    /* ── Layout ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    h1 { font-weight: 500; font-size: 1.6rem; letter-spacing: -0.01em; }
    h2 { font-weight: 500; font-size: 1.2rem; }
    h3 { font-weight: 400; font-size: 1rem; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-main);
      font-size: 0.875rem;
      font-weight: 400;
      padding: 0.55rem 1.1rem;
      border-radius: var(--radius);
      border: 1px solid var(--color-border);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, opacity 0.15s;
      text-decoration: none;
    }
    .btn-primary {
      background: var(--color-text);
      color: var(--color-bg);
      border-color: var(--color-text);
      font-weight: 500;
    }
    .btn-primary:hover { opacity: 0.88; }
    .btn-ghost {
      background: transparent;
      color: var(--color-text);
    }
    .btn-ghost:hover { background: var(--color-accent-dim); }
    .btn-danger {
      background: transparent;
      color: var(--color-danger);
      border-color: rgba(248,113,113,0.25);
    }
    .btn-danger:hover { background: rgba(248,113,113,0.08); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Card ── */
    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 9999;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      padding: 0.75rem 1.2rem;
      font-size: 0.875rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    /* ── Misc ── */
    .muted { color: var(--color-muted); font-size: 0.85rem; }
    .tag {
      display: inline-block;
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      border-radius: var(--radius);
      background: var(--color-accent-dim);
      border: 1px solid var(--color-border);
      letter-spacing: 0.04em;
    }

    hr { border: none; border-top: 1px solid var(--color-border); margin: 1.5rem 0; }

    /* ── Status badge ── */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.8rem;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      border: 1px solid;
    }
    .status-awaiting  { color: var(--color-warning); border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.06); }
    .status-completed { color: var(--color-success); border-color: rgba(52,211,153,0.3); background: rgba(52,211,153,0.06); }
    .status-failed    { color: var(--color-danger);  border-color: rgba(248,113,113,0.3); background: rgba(248,113,113,0.06); }
    .status-expired   { color: var(--color-muted);   border-color: var(--color-border);   background: transparent; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <a class="nav-brand" href="/"><i class="fa-solid fa-bolt"></i> &nbsp;shop!</a>
    <div class="nav-actions">
      <button class="cart-btn" onclick="window.location='/checkout'">
        <i class="fa-solid fa-basket-shopping"></i>
        Cart
        <span id="cart-count">0</span>
      </button>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <div id="toast"></div>

  <script>
    // ── Cart (localStorage) ──────────────────────────────────────────────────
    const Cart = {
      get() { return JSON.parse(localStorage.getItem('cart') || '[]'); },
      save(items) { localStorage.setItem('cart', JSON.stringify(items)); Cart.updateBadge(); },
      updateBadge() {
        const n = Cart.get().reduce((s, i) => s + i.qty, 0);
        document.querySelectorAll('#cart-count').forEach(el => el.textContent = n);
      },
      add(product_id) {
        const items = Cart.get();
        const existing = items.find(i => i.product_id === product_id);
        if (existing) existing.qty++;
        else items.push({ product_id, qty: 1 });
        Cart.save(items);
        toast('Added to cart');
      },
      remove(product_id) {
        Cart.save(Cart.get().filter(i => i.product_id !== product_id));
      },
      clear() { Cart.save([]); },
    };

    // ── Toast ────────────────────────────────────────────────────────────────
    let _toastTimer;
    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      clearTimeout(_toastTimer);
      _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
    }

    // Init badge
    Cart.updateBadge();
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
